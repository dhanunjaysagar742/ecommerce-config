
server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:

    gateway:

      discovery:

        locator:

          enabled: true

          lower-case-service-id: true

      routes:

        - id: user-auth

          uri: lb://USER-SERVICE

          predicates:

            - Path=/api/v1/auth/**

        - id: user-api

          uri: lb://USER-SERVICE

          predicates:

            - Path=/api/v1/users/**

eureka:

  client:

    service-url:

      defaultZone: http://localhost:8761/eureka/

management:

  endpoints:

    web:

      exposure:

        include: "*"

logging:

  level:

    org.springframework.cloud.gateway: INFO
