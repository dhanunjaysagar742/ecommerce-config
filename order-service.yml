server:
  port: 8083

spring:
  application:
    name: ORDER-SERVICE

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
